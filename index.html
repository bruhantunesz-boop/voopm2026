<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOO PM2026 • Check-in</title>
<link rel="stylesheet" href="style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<header class="topo">
  <div class="painel">
    <div class="painel-item">
      <span>VOO</span>
      <strong>PM2026</strong>
    </div>
    <div class="painel-item">
      <span>DESTINO</span>
      <strong>POSITIVAÇÃO</strong>
    </div>
    <div class="painel-item">
      <span>STATUS</span>
      <strong class="verde">EMBARQUE</strong>
    </div>
  </div>
</header>

<main class="container">
  <section class="pesquisa">
    <h1>✈️ VOO PM2026</h1>
    <h2>Central de Embarque</h2>
    <p>Bem-vindo(a)!<br><br>
    Faça seu check-in e descubra seu <strong>Portão de Embarque.</strong></p>

    <input type="text" id="pesquisa" placeholder="Digite seu nome">
    <div id="lista"></div>
  </section>

  <section id="cartao" class="cartao"></section>
</main>

<footer>
✈️ Nossa tripulação deseja um excelente voo rumo ao semestre 2026.2.
</footer>

<script src="script.js"></script>

</body>
</html>
