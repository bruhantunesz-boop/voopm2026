<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOO PM2026 | Check-in</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <header>
    <h1>✈️ VOO PM2026</h1>
    <p>Faça seu check-in e descubra seu Portão de Embarque.</p>
  </header>

  <main>
    <input id="pesquisa" type="text" placeholder="Digite seu nome..." autocomplete="off">
    <div id="resultados"></div>

    <section id="cartao" style="display:none">
      <h2>🎫 CARTÃO DE EMBARQUE</h2>
      <p><strong>Passageiro:</strong> <span id="nome"></span></p>
      <p><strong>Voo:</strong> PM2026</p>
      <p><strong>Destino:</strong> Positivação 2026.2</p>
      <p><strong>Gate:</strong> <span id="gate"></span></p>
      <p><strong>Mesa:</strong> <span id="mesa"></span></p>
      <p><strong>Status:</strong> ✅ Embarque autorizado</p>
      <button onclick="window.print()">🖨️ Imprimir cartão</button>
    </section>
  </main>
</div>

<script src="script.js"></script>
</body>
</html>
